<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Dados de Comida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-element blob-1"></div>
    <div class="background-element blob-2"></div>

    <nav class="navbar glass-panel">
        <h1>🍎 Banco de Dados de Comida</h1>
    </nav>

    <main class="container">
        <section class="panel glass-panel form-panel">
            <h2>Novo Cadastro</h2>
            <form id="cadastroForm">
                <div class="form-group">
                    <label for="nome">Nome do Alimento</label>
                    <input type="text" id="nome" required placeholder="Ex: Maçã, Arroz">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="quantidade">Quantidade de Unidades</label>
                        <input type="number" id="quantidade" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="peso">Peso/Volume (Kg/L)</label>
                        <input type="number" id="peso" min="0.01" step="0.01" value="1.0" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dataEntrada">Data de Entrada</label>
                        <input type="date" id="dataEntrada" required>
                    </div>
                    <div class="form-group">
                        <label for="dataValidade">Data de Validade</label>
                        <input type="date" id="dataValidade" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="preco">Preço Total Pago (R$)</label>
                    <input type="number" id="preco" min="0.01" step="0.01" required placeholder="Ex: 15.50">
                </div>

                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>
        </section>

        <section class="panel glass-panel table-panel">
            <h2>Estoque Atual</h2>
            <div class="table-container" style="display: none;">
                <table id="estoqueTable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Peso (Kg/L)</th>
                            <th>Entrada</th>
                            <th>Validade</th>
                            <th>Preço (R$)</th>
                            <th>Status</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="estoqueBody">
                        <!-- Itens renderizados aqui via JS -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="empty-state">
                <p>O estoque está vazio no momento.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
